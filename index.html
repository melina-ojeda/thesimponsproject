<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <title>The Simpsons Project</title>
</head>
<body>
    <header>
        <h1>The Simpsons Project</h1>
        <h2>A guide with all seasons and their episodes</h2>
        <input type="text" id="searchInput" placeholder="Search episode..." class="search-bar" oninput="filterEpisodes(this.value)">
        <select id="season-select" class="season-select" onchange="filterSeason(this.value)">
            <option value="">All Seasons</option>
        </select>
    </header>

    <main id="grilla-episodios" class="container">
        <div id="episodes-card" class="card"></div>
       </main>

    <div id="navegacion" class="navegacion">
        <button id="before" class="previous">Previous</button>
        <span id="page-info"></span>
        <button id="after" class="next">Next</button>
    </div>

  <script src="app.js"></script>
</body>
</html>
